name: Publish pre-release
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  github:
    name: Publish GitHub
    permissions:
      contents: write
    environment: GITHUB_PRE_RELEASE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
      - name: Package
        run: cargo package --workspace
      - name: Read version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | grep -oP '[\d.]+')" >> $GITHUB_OUTPUT
      - name: Read git commit hash
        id: commit_hash
        run: echo "commit_hash=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_OUTPUT
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided by GitHub Actions
        run: gh release create "${{ steps.commit_hash.outputs.commit_hash }}" --repo="$GITHUB_REPOSITORY" --target main --title="Pre-Release ${{ steps.commit_hash.outputs.commit_hash }} (${{ steps.version.outputs.version }})" --generate-notes --prerelease ./target/package/*.crate
